         function playAudio(audioObj) {

const energyColors = [
    "#ff7675", // vermelho

];

            const sprites = {};
                    const assetNames = ['miner', 'ferro', 'ouro', 'diamante', 'rocha', 'pedra_negra', 'dog', 'cat', 'loja'];
                    const fileNames = ['minerador.png', 'ferro.png', 'ouro.png', 'diamante.png', 'rocha.png', 'pedra_negra.png', 'dog.png', 'cat.png', 'loja.png'];

         const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let shakeAmount = 0; 
        let mode = 'mine', score = 0, coins = 0, currentLevel = 1, energy = 100, gameActive = false, isShopOpen = false;
        let lastShopTime = 0;
        let isPaused = false;
        let petTimer = 0;
        let pets = { dog: { owned: false, lvl: 0 }, cat: { owned: false, lvl: 0 } };
        let upgrades = { pickaxe: 0, energy: 0};
        let zoomEffect = 0;

        let particles = [];

        let musicMuted = false;
        let sfxMuted = false;
        let minerPos = { x: 0, y: 110 };
        let playerHubPos = { x: 0, y: 0 }, targetHubPos = { x: 0, y: 0 };
        let hook = { x: 0, y: 0, angle: 0, state: 'idle', caughtItem: null, catchTimer: 0 };
        let items = [];
        let isRetracting = false;
       const ENERGY_STEP = 10;

function getMaxEnergy() {
    return 100 + (upgrades.energy * ENERGY_STEP);
}

function limitarEnergia() {
    const maxEnergy = getMaxEnergy();
    if (energy > maxEnergy) energy = maxEnergy;
    if (energy < 0) energy = 0;
}

        canvas.width = window.innerWidth;

        canvas.height = window.innerHeight;
        
        minerPos.x = canvas.width / 2;

playerHubPos = {

};

        function saveGame() {

    const data = {
        score: Number(score) || 0,
        coins: Number(coins) || 0,
        currentLevel: Number(currentLevel) || 1,
        energy: Number(energy) || 100,
        pets: pets,
        upgrades: upgrades,
        musicMuted,
        sfxMuted
    };

    localStorage.setItem('mina_infinita_save', JSON.stringify(data));
}



 function loadGame() {

    const saved = localStorage.getItem('mina_infinita_save');

    if (saved) {
    
        const data = JSON.parse(saved);

        score = Number(data.score) || 0;
        coins = Number(data.coins) || 0;
        currentLevel = Number(data.currentLevel) || 1;
        energy = Number(data.energy) || 100;
        musicMuted = data.musicMuted || false;
    sfxMuted = data.sfxMuted || false;
    updateAudioButtons();

        // 🔥 GARANTE ESTRUTURA DOS PETS
        pets = {
            dog: {
                owned: data.pets?.dog?.owned || false,
                lvl: data.pets?.dog?.lvl || 0
            },
            cat: {
                owned: data.pets?.cat?.owned || false,
                lvl: data.pets?.cat?.lvl || 0
            }
        };

        upgrades = {
    pickaxe: data.upgrades?.pickaxe || 0,
    energy: data.upgrades?.energy || 0
    
};
musicMuted = data.musicMuted || false;
    sfxMuted = data.sfxMuted || false;
    sounds.bgm.volume = musicMuted ? 0 : 0.3;
    updateAudioButtons();

        updateUI();
    }
}       



        function startGame() {

    // 🔥 fecha o overlay PRIMEIRO
    const overlay = document.getElementById('overlay');
    if (overlay) overlay.style.display = 'none';

    // depois carrega o jogo
    loadGame();

    gameActive = true;
    playBGM();
    nextLevel(true);
    draw();
}

function toggleMusic() {
    musicMuted = !musicMuted;

    sounds.bgm.volume = musicMuted ? 0 : 0.3;

    if (!musicMuted) {
        playBGM();
    } else {
        stopAudio(sounds.bgm);
    }

    updateAudioButtons();
    saveGame(); // salva persistência imediata
}

function toggleSFX() {
    sfxMuted = !sfxMuted;
    updateAudioButtons();
    saveGame(); // salva persistência imediata
}
function playBGM() {
    if (musicMuted) return;
    sounds.bgm.currentTime = 0;
    sounds.bgm.volume = 0.3;
    sounds.bgm.play().catch(() => {});
}

function playSFX(audioObj) {
    if (sfxMuted) return;
    audioObj.currentTime = 0;
    audioObj.play().catch(() => {});
}

function getEnergyCost() {
    const base = 5;
    const reduced = Math.max(1, base - upgrades.pickaxe);
    return { base, reduced };
}

function updateAudioButtons() {
    const buttons = document.querySelectorAll("#audio-controls button");

    // botão música
    buttons[0].innerText = musicMuted ? "🔇" : "🎵";

    // botão efeitos
    buttons[1].innerText = sfxMuted ? "🔕" : "🔊";
}
function showEnergyCost() {
    const cost = getEnergyCost();
    const el = document.getElementById('energy-cost');

    el.innerText = `-${cost.base} → -${cost.reduced}`;
    el.style.opacity = 1;

    setTimeout(() => {
        el.style.opacity = 0;
    }, 1000);
}



        function showLevelPopUp() {

            const popup = document.getElementById('level-start-ui');

            const label = document.getElementById('booster-label');

            const hasPet = pets.dog.owned || pets.cat.owned;

           

            document.getElementById('level-title').innerText = "NÍVEL " + currentLevel;

            petTimer = 0;



            if (currentLevel % 5 === 0) {

                petTimer = 60;

                label.innerText = "🚀 SUPER BOOSTER (60s) 🚀";

                label.style.color = "gold";

            } else if (hasPet) {

                petTimer = 20;

                label.innerText = "🐾 BOOSTER PET (20s) 🐾";

                label.style.color = "#55efc4";

            } else {

                label.innerText = "SEM BOOSTER (COMPRE UM PET)";

                label.style.color = "#ff7675";

            }



            const petsList = document.getElementById('active-pets-list');

            petsList.innerHTML = "";

            if (pets.dog.owned) petsList.innerHTML += `<img src="${sprites.dog.src}" width="40">`;

            if (pets.cat.owned) petsList.innerHTML += `<img src="${sprites.cat.src}" width="40">`;



            popup.style.display = 'block';

            setTimeout(() => { popup.style.display = 'none'; }, 3000);

        }



        function nextLevel(first = false) {

            if(!first) { currentLevel++; saveGame(); }

            showLevelPopUp();

            document.getElementById('level-title').innerText = getCurrentBiome().name + " - NÍVEL " + currentLevel;

            createItems();

            updateUI();

        }

const marginTop = 260;     // onde começa o chão (abaixo do miner)
const marginBottom = 100;  // espaço do botão VILA
const marginSide = 30;     // laterais

        function createItems() {

            items = [];

            const types = ['ferro', 'ouro', 'diamante', 'rocha'];

            if (currentLevel >= 3) types.push('pedra_negra');

            for (let i = 0; i < 8 + currentLevel; i++) {

                const type = types[Math.floor(Math.random() * types.length)];

                let weight = 2, value = 50;

weight += currentLevel * 0.2;
value += currentLevel * 5;

if (type === 'rocha') {
    weight = 9;
    value = 10;
}
else if (type === 'ferro') {
    weight = 3;
    value = 30;
}
else if (type === 'ouro') {
    weight = 4;
    value = 70;
}
else if (type === 'diamante') {
    weight = 5;
    value = 120;
}
else if (type === 'pedra_negra') {
    weight = 7;
    value = 180;
}

                items.push({
    x: Math.random() * (canvas.width - marginSide * 2) + marginSide,
y: marginTop + Math.random() * (canvas.height - marginTop - marginBottom),
    spriteKey: type,
    weight,
    value
});

            }

        }



function updateUI() {
    limitarEnergia();

    document.getElementById('score-text').innerText = Math.floor(score);
    document.getElementById('coins-text').innerText = coins;
    document.getElementById('level-text').innerText = currentLevel;

    document.getElementById('energy-level').innerText = upgrades.energy;
    document.getElementById('pickaxe-level').innerText = upgrades.pickaxe;

    const dog = document.getElementById('dog-lvl-display');
    const cat = document.getElementById('cat-lvl-display');

    if (dog) dog.innerText = "Lvl: " + pets.dog.lvl;
    if (cat) cat.innerText = "Lvl: " + pets.cat.lvl;

    document.getElementById('pet-power-ui').style.display = (petTimer > 0) ? 'block' : 'none';
    document.getElementById('pet-timer-text').innerText = petTimer + "s";

   const bar = document.getElementById('energy-base');

if (bar) {
    const energiaPorCamada = 100;

    let camada = Math.floor((energy - 1) / energiaPorCamada);
    if (energy <= 0) camada = 0;

    let energiaAtual = energy % energiaPorCamada;
    if (energiaAtual === 0 && energy > 0) {
        energiaAtual = 100;
    }

    bar.style.width = energiaAtual + "%";
    bar.style.background = energyColors[camada % energyColors.length];

    

    saveGame();
}


}



        // Booster congela se não estiver na mina

        setInterval(() => {

            if (gameActive && petTimer > 0 && mode === 'mine') {

                petTimer--;

                updateUI();

            }

        }, 1000);

            let lojas = [];

function atualizarLojas() {
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;

    lojas = [
        { x: centerX + 2, y: centerY - 250, tipo: 'principal' },
        { x: centerX - 145, y: centerY - 160, tipo: 'pets' },
        { x: centerX + 145, y: centerY - 160, tipo: 'upgrade' }
    ];
}


        function update() {
    if (!gameActive) return;
    limitarEnergia();
    if (shakeAmount > 0) shakeAmount *= 0.85;
    else shakeAmount = 0;

    if (mode === 'mine') {
    if (isPaused) return;

    // 🛠️ anti bug: se ficar preso fora da tela
if (hook.x < -50 || hook.x > canvas.width + 50 || hook.y > canvas.height + 50) {
    hook.state = 'idle';
    hook.caughtItem = null;
    hook.catchTimer = 0;
    isRetracting = false;
    hook.x = minerPos.x;
    hook.y = minerPos.y;
}

     if (hook.state === 'idle') {
        hook.x = minerPos.x;
        hook.y = minerPos.y;
    }

        if (hook.state === 'extending') {

            hook.x += Math.cos(hook.angle) * 12;
            hook.y += Math.sin(hook.angle) * 12;

            if (
    hook.y > canvas.height - marginBottom ||
    hook.x < marginSide ||
    hook.x > canvas.width - marginSide
) {
    hook.state = 'retracting';
    isRetracting = true;
} else {
                for (let i = items.length - 1; i >= 0; i--) {
                    let it = items[i];

                    if (Math.hypot(hook.x - it.x, hook.y - it.y) < 30) {
                        hook.caughtItem = items.splice(i, 1)[0];
                        hook.state = 'catching';
                        hook.catchTimer = 30;  // Delay de ~0.5 segundos (30 frames a 60fps)
                        stopAudio(sounds.hook);
                        playAudio(sounds.catch);

                        if (hook.caughtItem.weight >= 5) {
                            shakeAmount = hook.caughtItem.weight * 4;
                        }
                        break;
                    }
                }
            }

        } else if (hook.state === 'catching') {
            hook.catchTimer--;
            if (hook.catchTimer <= 0) {
                hook.state = 'retracting';
                isRetracting = true;
            }

        } else if (hook.state === 'retracting') {

            let dogBoost = (pets.dog.owned && petTimer > 0)
                ? (1 + (pets.dog.lvl * 0.5))
                : (petTimer > 0 ? 1.2 : 1);

            let s = 12 / (1 + (hook.caughtItem ? (hook.caughtItem.weight / dogBoost) : 0));
            let d = Math.hypot(minerPos.x - hook.x, minerPos.y - hook.y);

            if (d < 15) {

                if (hook.caughtItem) {
                    let catBoost = (pets.cat.owned && petTimer > 0)
                        ? 2.5
                        : (petTimer > 0 ? 1.5 : 1);

                    score += hook.caughtItem.value * catBoost;
                    saveGame();
                    hook.caughtItem = null;
                    updateUI();


                    stopAudio(sounds.catch);
                    stopAudio(sounds.hook);

                    if (items.length === 0) {
                        playAudio(sounds.coin);
                        nextLevel();
                    }
                }

                hook.state = 'idle';
                hook.x = minerPos.x;
                hook.y = minerPos.y;
                canShoot = true;
                isRetracting = false;

            } else {
                hook.x += ((minerPos.x - hook.x) / d) * s;
                hook.y += ((minerPos.y - hook.y) / d) * s;
            }
        }

   } else {

    let dx = targetHubPos.x - playerHubPos.x;
    let dy = targetHubPos.y - playerHubPos.y;
    let dist = Math.hypot(dx, dy);

    if (dist > 5) {
        playerHubPos.x += (dx / dist) * 5;
        playerHubPos.y += (dy / dist) * 5;
    }

    lojas.forEach(loja => {
        const distLoja = Math.hypot(
            playerHubPos.x - loja.x,
            playerHubPos.y - loja.y
        );
     if (!isShopOpen && distLoja < 70 && Date.now() - lastShopTime > 2000){ 
            openShop(loja.tipo);
        }
    });

            const biome = getCurrentBiome();

if (biome.name === "Dimensão Escarlate" || biome.name === "Dimensão Escarlate 2") {
    // efeito tipo Nether (fumaça, brasas e brilho escarlate)
    if (Math.random() < 0.45) {
        const isEmber = Math.random() < 0.65;
        particles.push({
            x: Math.random() * canvas.width,
            y: canvas.height + 10,
            vx: (Math.random() - 0.5) * 1.5,
            vy: - (Math.random() * 1.5 + (isEmber ? 0.7 : 0.5)),
            size: isEmber ? Math.random() * 3 + 1.5 : Math.random() * 6 + 4,
            alpha: isEmber ? (Math.random() * 0.6 + 0.4) : (Math.random() * 0.25 + 0.1),
            color: isEmber ? `rgba(255, ${Math.floor(100 + Math.random() * 155)}, 0, ${isEmber ? 0.65 : 0.35})` : `rgba(120, 25, 15, ${Math.random() * 0.3 + 0.08})`,
            life: isEmber ? 1 : 1.5
        });
    }

    hook.x += Math.sin(Date.now() * 0.02) * 1.5;
}

particles.forEach(p => {
    p.x += p.vx || 0;
    p.y += p.vy || -(p.speed || 1);
    p.alpha -= (p.life || 1) * 0.008;
});

particles = particles.filter(p => p.alpha > 0 && p.y > -20);

}
} // ← ESSA CHAVE É O QUE TAVA FALTANDO
            const biomes = [
    { name: "Caverna de Terra", sky: "#2c3e50", ground: "#4e342e" },
    { name: "Caverna Úmida", sky: "#34495e", ground: "#6d4c41" },
    { name: "Mina de Ferro", sky: "#7f8c8d", ground: "#95a5a6" },
    { name: "Mina de Ouro", sky: "#f1c40f", ground: "#d4ac0d" },
    {name: "Dimensão Escarlate", sky: "#1a0f0f", ground: "#8b0000" },
    { name: "Geleira Profunda", sky: "#c7ecee", ground: "#0984e3" },
    { name: "Mina de Gelo", sky: "#dff9fb", ground: "#74b9ff" },
    { name: "Floresta Subterrânea", sky: "#2d3436", ground: "#27ae60" },
    { name: "Pântano Tóxico", sky: "#1e272e", ground: "#05c46b" },
    { name: "Caverna de Cristal", sky: "#2f3542", ground: "#a29bfe" },
    { name: "Ruínas Antigas", sky: "#636e72", ground: "#b2bec3" },
    { name: "Deserto Subterrâneo", sky: "#eccc68", ground: "#e1b12c" },
    { name: "Núcleo Vulcânico", sky: "#2d3436", ground: "#d63031" },
    { name: "Abismo Sombrio", sky: "#000000", ground: "#2d3436" },
    { name: "Caverna Radioativa", sky: "#0f2027", ground: "#00ff9f" },
    { name: "Núcleo do Planeta", sky: "#1a1a1a", ground: "#ff3f34" },
    {name: "Dimensão Escarlate 2", sky: "#1a0f0f", ground: "#8b0000" }
];

                

            function getCurrentBiome() {

                // Calcula o índice (0 para níveis 1-5, 1 para 6-10, etc.)

                let index = Math.floor((currentLevel - 1) / 5);

                // Se o nível for muito alto, mantém o último bioma

                if (index >= biomes.length) index = biomes.length - 1;

                return biomes[index];

            }


resizeCanvas();

        function draw() {

            const biome = getCurrentBiome(); // Pega o bioma atual



            ctx.save();

            if (zoomEffect > 0) {
    const scale = 1 + zoomEffect * 0.05;

    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.scale(scale, scale);
    ctx.translate(-canvas.width / 2, -canvas.height / 2);

    zoomEffect *= 0.9;
}

            if (shakeAmount > 0) ctx.translate((Math.random() - 0.5) * shakeAmount, (Math.random() - 0.5) * shakeAmount);

            ctx.clearRect(0, 0, canvas.width, canvas.height);



            if (mode === 'mine') {
// FUNDO PRIMEIRO
ctx.fillStyle = biome.sky;
ctx.fillRect(0, 0, canvas.width, 260);

ctx.fillStyle = biome.ground;
ctx.fillRect(0, 160, canvas.width, canvas.height);

particles.forEach(p => {
    ctx.fillStyle = p.color || `rgba(255, 80, 40, ${p.alpha})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    if (p.life && p.alpha > 0.2) {
        ctx.fillStyle = p.color ? p.color.replace(/rgba\((.*),\s*([\d\.]+)\)/, (m, c, a) => `rgba(${c}, ${Math.max(0.05, Math.min(0.2, Number(a)*0.5))})`) : `rgba(255, 120, 40, ${Math.max(0.05, p.alpha*0.4)})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * 1.6, 0, Math.PI * 2);
        ctx.fill();
    }
});

if (biome.name === "Dimensão Escarlate" || biome.name === "Dimensão Escarlate 2") {
    ctx.fillStyle = "rgba(128, 16, 16, 0.15)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}
// ITENS
items.forEach(it => {
    ctx.drawImage(sprites[it.spriteKey], it.x - 20, it.y - 20, 40, 40);
});

// CORDA
ctx.strokeStyle = "white";
ctx.lineWidth = 3;
ctx.beginPath();
ctx.moveTo(minerPos.x, minerPos.y);
ctx.lineTo(hook.x, hook.y);
ctx.stroke();

// ITEM NO GANCHO
if (hook.caughtItem) {
    ctx.drawImage(sprites[hook.caughtItem.spriteKey], hook.x - 20, hook.y - 20, 40, 40);
}

// MINER POR ÚLTIMO (sempre por cima)

                // Efeito de cansaço no minerador

                if (energy <= 0) ctx.filter = "grayscale(100%) opacity(0.7)";

                ctx.drawImage(sprites.miner, minerPos.x - 40, minerPos.y - 40, 80, 80);

                ctx.filter = "none";



            } else {

                // Modo Vila (Cor fixa ou você pode mudar também!)

                ctx.fillStyle = "#2ecc71"; // ou qualquer cor que quiser

                ctx.fillRect(0,0, canvas.width, canvas.height);

                 lojas.forEach(loja => {
    if (loja.tipo === 'principal') {
        ctx.save();
        ctx.filter = 'invert(100%)';
        ctx.drawImage(sprites.loja, loja.x - 60, loja.y - 60, 120, 120);
        ctx.restore();
    } else {
        ctx.drawImage(sprites.loja, loja.x - 60, loja.y - 60, 120, 120);
    }
    let title = '';
    if (loja.tipo === 'principal') title = 'Loja Principal';
    else if (loja.tipo === 'pets') title = 'Loja de Pets';
    else if (loja.tipo === 'upgrade') title = 'Loja de Upgrades';
    if (title) {
        ctx.fillStyle = 'rgba(128,128,128,0.8)';
        ctx.fillRect(loja.x - 60, loja.y - 90, 120, 25);
        ctx.fillStyle = 'white';
        ctx.font = '14px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(title, loja.x, loja.y - 77.5);
    }
});

                ctx.drawImage(sprites.miner, playerHubPos.x-40, playerHubPos.y-40, 80, 80);

                if (pets.dog.owned) ctx.drawImage(sprites.dog, playerHubPos.x - 70, playerHubPos.y, 40, 40);

                if (pets.cat.owned) ctx.drawImage(sprites.cat, playerHubPos.x + 30, playerHubPos.y, 40, 40);

            }

            ctx.restore();

            update();

            requestAnimationFrame(draw);

        }



        function toggleHub() {

    if (mode === 'mine') {
        // indo pra vila
        mode = 'hub';
        isPaused = true;
        saveGame();

    } else {
        // voltando pra mina
        mode = 'mine';
        isPaused = false;

        // 🔥 RESET LIMPO DO GANCHO
        hook = {
            x: minerPos.x,
            y: minerPos.y,
            angle: 0,
            state: 'idle',
            caughtItem: null,
            catchTimer: 0
        };
        isRetracting = false;

        // 🔥 GARANTE UI ATUALIZADA
        updateUI();
    }

    document.getElementById('btn-hub').innerText =
        (mode === 'mine') ? 'VILA' : 'MINA';
}

       function openShop(tipo) {
    isShopOpen = true;
    const shop = document.getElementById('shop-ui');
    shop.classList.add('active');


    if (tipo === 'principal') {
        shop.innerHTML = `
            <h2 style="color:#2ecc71;">LOJA PRINCIPAL</h2>

            <div class="shop-item">
                ☕ Café Expresso<br>
                <small>Restaura 100% Energia</small><br>
                <button onclick="buyCoffee()" style="background:#6f4e37;">50 MC</button>
            </div>

            <div class="shop-item">
                💰 Converter<br>
                <button onclick="convertPoints()" style="background:gold; color:black;">
                    200 Pts ➔ 50 MC
                </button>
            </div>

            <button onclick="closeShop()" style="background:#c0392b; width:100%; margin-top:10px;">
                FECHAR
            </button>
        `;
    }

    else if (tipo === 'pets') {

    const dogPrice = 100 + Math.floor(pets.dog.lvl * 20);
    const catPrice = 100 + Math.floor(pets.cat.lvl * 20);

    shop.innerHTML = `
        <h2 style="color:#55efc4;">🐾 LOJA DE PETS</h2>

        <div class="shop-item">
            🐶 Doguinho (Força)<br>
            <small>Nível: ${pets.dog.lvl}</small><br>
            <small>Velocidade +${(pets.dog.lvl * 8)}%</small><br>
            <button onclick="buyPet('dog')">
                ${pets.dog.owned ? `UPGRADE (${dogPrice} MC)` : `COMPRAR (${dogPrice} MC)`}
            </button>
        </div>

        <div class="shop-item">
            🐱 Gatinho (Sorte)<br>
            <small>Nível: ${pets.cat.lvl}</small><br>
            <small>Multiplicador x${(1 + pets.cat.lvl * 0.15).toFixed(2)}</small><br>
            <button onclick="buyPet('cat')">
                ${pets.cat.owned ? `UPGRADE (${catPrice} MC)` : `COMPRAR (${catPrice} MC)`}
            </button>
        </div>

        <button onclick="closeShop()" style="background:#c0392b; width:100%; margin-top:10px;">
            FECHAR
        </button>
    `;
}
   else if (tipo === 'upgrade') {

    shop.innerHTML = `
        <h2 style="color:#74b9ff;">⚙️ LOJA DE UPGRADES</h2>

        <div class="shop-item">
            ⛏️ Melhoria de Picareta<br>
            <small>Nível: ${upgrades.pickaxe}</small>
            <small>Menos gasto de energia</small><br>
            <button onclick="buyUpgrade('pickaxe')">
                150 MC
            </button>
        </div>

        <div class="shop-item">
            ⚡ Melhoria de Energia<br>
            <small>Nível: ${upgrades.pickaxe}</small>
            <small>Aumenta limite de energia</small><br>
            <button onclick="buyUpgrade('energy')">
                200 MC
            </button>
        </div>

        <button onclick="closeShop()" style="background:#c0392b; width:100%; margin-top:10px;">
            FECHAR
        </button>
    `;
}

    shop.classList.add('active');
}

      function closeShop() {
    isShopOpen = false;
    document.getElementById('shop-ui').classList.remove('active');
}

       

        function buyPet(type) {

    let price = 100 + Math.floor(pets[type].lvl * 20);

    if (coins >= price) {
        coins -= price;

        pets[type].owned = true;
        pets[type].lvl++;

        playAudio(sounds.coin);
        updateUI();
        saveGame();

        openShop('pets'); // atualiza a loja
    }
}

        function convertPoints() { if (score >= 200) { score -= 200; coins += 50; playAudio(sounds.coin); updateUI(); saveGame(); } }

   window.closeShop = function() {
    isShopOpen = false;

    const shop = document.getElementById('shop-ui');
    shop.classList.remove('active');

    lastShopTime = Date.now();
// debug
}    

        // Função do Café

       function buyCoffee() {
    if (coins < 50) return;

    coins -= 50;
    energy = getMaxEnergy();

    playAudio(sounds.coin);
    updateUI();
    saveGame();
}



function buyUpgrade(type) {
    if (type === 'pickaxe' && coins >= 150) {
        coins -= 150;
        upgrades.pickaxe++;
        zoomEffect = 1;
    }

    if (type === 'energy' && coins >= 200) {
        if (upgrades.energy >= 100) return;

        coins -= 200;
        upgrades.energy++;
        limitarEnergia();
        zoomEffect = 0.5;
    }

    updateUI();
    saveGame();
}

       canvas.addEventListener('mousedown', (e) => {
if (!canShoot) return;
if (isRetracting) return;
    if (isShopOpen) return; // só bloqueia loja
const now = Date.now();

if (now - lastThrowTime < 300) return; // 300ms de delay

lastThrowTime = now;
    // 🏠 VILA
    if (mode === 'hub') {
        const rect = canvas.getBoundingClientRect();

        targetHubPos.x = e.clientX - rect.left;
        targetHubPos.y = e.clientY - rect.top;
        return;
    }

    // ⛏️ MINA
    if (mode === 'mine') {

        if (hook.state !== 'idle') {
    // 🔥 força reset se bugar
    hook.state = 'idle';
    hook.caughtItem = null;
    hook.x = minerPos.x;
    hook.y = minerPos.y;
}
        if (energy <= 0) {
            const warning = document.getElementById('energy-warning');
            warning.style.display = 'block';

            setTimeout(() => {
                warning.style.display = 'none';
            }, 2000);

            return;
        }

        energy -= 5;
        updateUI();

        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        hook.angle = Math.atan2(
    mouseY - minerPos.y,
    mouseX - minerPos.x
);

        hook.state = 'extending';
        playAudio(sounds.hook);
    }
});

        resizeCanvas();
        atualizarLojas();

    draw();
       window.addEventListener('resize', () => {
    resizeCanvas();
    atualizarLojas();

    minerPos.x = canvas.width / 2;

    playerHubPos.x = canvas.width / 2;
    playerHubPos.y = canvas.height - 150;

    targetHubPos = { ...playerHubPos };
    draw();
});
    setInterval(saveGame, 5000);

    </script>

</body>

    </script>
